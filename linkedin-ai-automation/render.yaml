# Render.com — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: linkedin-ai-automation
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Add all secrets in Render Dashboard → Environment:
      # GEMINI_API_KEY, CLOUDINARY_*, COMPOSIO_API_KEY, MOCK_LINKEDIN_PUBLISH=false, etc.
